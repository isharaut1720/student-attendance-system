<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Attendance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Student Attendance System</h1>

    <div class="controls">
        <input type="date" id="date" onchange="loadAttendance()">
        <input type="text" id="studentName" placeholder="Enter Student Name">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <input type="text" id="search" placeholder="Search Student" onkeyup="displayStudents()" style="margin-bottom:10px; padding:8px; width:100%;">

    <table>
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Student Name</th>
                <th>Status</th>
                <th>Attendance %</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script src="script.js"></script>

<footer>
    <p>© 2026 Student Attendance System | Made by Isha Raut</p>
</footer>

</body>
</html>
